services:
  - type: web
    name: mifteh-os-api
    runtime: python
    buildCommand: pip install -r requirements-app.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO_YALLAPLAYS
        value: Zakoosh/Yallaplays
      - key: GITHUB_REPO_FIONERA
        value: Zakoosh/fionera
      - key: GITHUB_REPO_MIFTEH
        value: Zakoosh/mifteh
      - key: MIFTEH_OS_URL
        value: https://miftehos.com
      - key: VITE_TWELVE_DATA_API_KEY
        sync: false
      - key: VITE_ALPHA_VANTAGE_API_KEY
        sync: false
      - key: VITE_TWELVE_DATA_BASE_URL
        value: https://api.twelvedata.com
