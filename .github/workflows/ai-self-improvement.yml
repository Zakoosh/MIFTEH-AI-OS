name: MIFTEH AI Self-Improvement Engine

# Analyzes MIFTEH OS's own operational metrics: token efficiency, cost-per-feature,
# workflow health, prompt quality, and generation velocity.
# Produces a self-improvement report and optionally creates a GitHub Issue.
# Runs weekly on Sundays at 06:00 UTC.

on:
  schedule:
    - cron: '0 6 * * 0'   # Sunday 06:00 UTC weekly
  workflow_dispatch:
    inputs:
      create_github_issue:
        description: 'Create GitHub issue with improvement report'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  self-improvement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run self-improvement analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          CREATE_GITHUB_ISSUE: ${{ inputs.create_github_issue || 'false' }}
        run: python scripts/self_improvement_engine.py

      - name: Aggregate dashboard with health metrics
        run: python scripts/aggregate_dashboard.py

      - name: Commit self-improvement report
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/self_improvement_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Self-improvement analysis [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
