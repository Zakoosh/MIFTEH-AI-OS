name: MIFTEH AI SEO Opportunity Engine

# Keyword gap detection, semantic cluster generation, long-tail discovery,
# internal linking optimization, topical authority mapping.
# Runs Mon 02:00 UTC — after web intelligence.

on:
  schedule:
    - cron: '0 2 * * 1'    # Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]

permissions:
  contents: write

jobs:
  seo-opportunity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run SEO opportunity engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
        run: python scripts/seo_opportunity_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit SEO opportunity data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/seo_opportunities.json memory/analytics_intelligence.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: SEO opportunity cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
