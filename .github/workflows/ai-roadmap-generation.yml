name: MIFTEH AI Roadmap Generator

# AI-driven product roadmap generation for all 3 projects.
# Detects SEO gaps, feature gaps, UX gaps, monetization opportunities,
# engagement opportunities. Generates prioritized roadmap + injects
# decisions into the autonomous executor queue.
# Runs Tuesday 08:00 UTC — before executor (Wed).

on:
  schedule:
    - cron: '0 8 * * 2'    # Tuesday 08:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]
      force_regenerate:
        description: 'Force regenerate all roadmaps (ignore cache)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  roadmap-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate product roadmap
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate || 'false' }}
        run: python scripts/product_roadmap_engine.py

      - name: Aggregate dashboard with roadmap data
        run: python scripts/aggregate_dashboard.py

      - name: Commit roadmap
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/roadmap.json memory/analytics_intelligence.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Product roadmap generation [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
