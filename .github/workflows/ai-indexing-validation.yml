name: AI Indexing Validation

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-indexing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai google-auth requests oauth2client httplib2

      - name: Run publishing pipeline sync
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_LOG_TOKEN: ${{ secrets.TELEGRAM_LOG_TOKEN }}
          TELEGRAM_ADMIN_LOG_TOKEN: ${{ secrets.TELEGRAM_ADMIN_LOG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          YALLAPLAYS_BASE_URL: ${{ secrets.YALLAPLAYS_BASE_URL || 'https://yallaplays.com' }}
          REPO_YALLAPLAYS: ${{ secrets.REPO_YALLAPLAYS }}
        run: python scripts/publishing_pipeline.py

      - name: Run asset generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_LOG_TOKEN: ${{ secrets.TELEGRAM_LOG_TOKEN }}
          TELEGRAM_ADMIN_LOG_TOKEN: ${{ secrets.TELEGRAM_ADMIN_LOG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/game_asset_generator.py

      - name: Commit validation outputs
        run: |
          git config user.name "MIFTEH OS"
          git config user.email "actions@mifteh.ai"
          git add memory/publishing_pipeline_report.json memory/publishing_pipeline/ memory/game_asset_report.json outputs/yallaplays/assets/ outputs/yallaplays/category_assets/ || true
          git diff --cached --quiet || git -c commit.gpgsign=false commit -m "chore: pipeline validation + assets $(date -u +%Y-%m-%d)"
          git push
