name: MIFTEH AI Visual Preview Generator

# Downloads HTML from product PR branches, runs visual QA scoring,
# and saves previews + QA reports to the dashboard.
# Runs after feature builder on Monday, or on-demand.

on:
  schedule:
    - cron: '30 9 * * 1'   # Monday 09:30 UTC — after ai-feature-builder
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]
      force_revalidate:
        description: 'Re-run QA even for already-validated files'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  visual-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate previews and run visual QA
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          FORCE_REVALIDATE: ${{ inputs.force_revalidate || 'false' }}
        run: python scripts/generate_previews.py

      - name: Aggregate dashboard with QA data
        run: python scripts/aggregate_dashboard.py

      - name: Commit preview files and QA reports
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/visual_qa/ memory/visual_qa_summary.json frontend/dashboard/ || true
          git diff --cached --quiet || git commit -m "AI: Visual previews + QA reports [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
