name: MIFTEH AI Observability Engine

# Deployment latency, AI latency, workflow bottlenecks,
# memory retrieval performance, agent activity heatmaps,
# error propagation tracking.
# Runs daily 14:00 UTC — after all other daily workflows.

on:
  schedule:
    - cron: '0 14 * * *'    # Daily 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  observability-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run observability engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/observability_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit observability state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/observability_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Observability engine cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
