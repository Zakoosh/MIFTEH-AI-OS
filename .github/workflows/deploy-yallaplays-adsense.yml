name: Deploy YallaPlays AdSense Branch

on:
  schedule:
    - cron: '11 11 17 5 *'
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Target branch name in Yallaplays repo'
        required: true
        default: 'feat/adsense-production-activation'

permissions:
  contents: write

jobs:
  deploy-yallaplays:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MIFTEH-AI-OS
        uses: actions/checkout@v4

      - name: Setup git identity
        run: |
          git config --global user.name "MIFTEH AI OS"
          git config --global user.email "mifteh-ai@users.noreply.github.com"

      - name: Clone Yallaplays with GH_PAT
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          BRANCH: ${{ github.event.inputs.branch_name || 'feat/adsense-production-activation' }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/Zakoosh/Yallaplays.git" /tmp/yallaplays
          cd /tmp/yallaplays
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"

      - name: Sync production files
        run: |
          cd /tmp/yallaplays
          rsync -av "${GITHUB_WORKSPACE}/deploy/yallaplays/" .
          git status --short | head -50

      - name: Commit and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          BRANCH: ${{ github.event.inputs.branch_name || 'feat/adsense-production-activation' }}
        run: |
          cd /tmp/yallaplays
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat(adsense): activate production monetization pipeline"
          fi
          git push "https://x-access-token:${GH_PAT}@github.com/Zakoosh/Yallaplays.git" "$BRANCH" --set-upstream

      - name: Create PR
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          BRANCH: ${{ github.event.inputs.branch_name || 'feat/adsense-production-activation' }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          printf 'Production AdSense Deployment by MIFTEH AI OS\n\nPublisher: ca-pub-1206965892808259\nAdSense injected across 100+ pages, compliance pages added, score 80/100.\n' > /tmp/pr_body.txt
          gh pr create \
            --repo Zakoosh/Yallaplays \
            --head "$BRANCH" \
            --base main \
            --title "feat(adsense): Production AdSense Activation + Compliance Pages" \
            --body-file /tmp/pr_body.txt 2>&1 || echo "PR may already exist"
