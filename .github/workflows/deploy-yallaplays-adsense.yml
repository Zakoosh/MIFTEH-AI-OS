name: Deploy YallaPlays AdSense Branch

# Full production deployment pipeline:
# Pre-flight -> Clone -> Sync -> Push -> PR -> Merge -> Pages -> Live validation
# NEVER reports success without completing every step.

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Feature branch name in Yallaplays repo'
        required: false
        default: 'feat/adsense-production-activation'
      auto_merge:
        description: 'Auto-merge PR after creation'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  YALLAPLAYS_REPO: Zakoosh/Yallaplays
  DEPLOY_BRANCH: ${{ github.event.inputs.branch_name || 'feat/adsense-production-activation' }}
  LIVE_URL: https://yallaplays.com
  CLONE_DIR: /tmp/yallaplays

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout MIFTEH-AI-OS
        uses: actions/checkout@v4

      - name: Pre-flight validation
        run: |
          echo "=== PRE-FLIGHT VALIDATION ==="
          echo "DEPLOY_BRANCH : $DEPLOY_BRANCH"
          echo "YALLAPLAYS_REPO: $YALLAPLAYS_REPO"
          echo "LIVE_URL      : $LIVE_URL"
          echo "CLONE_DIR     : $CLONE_DIR"

          BUNDLE="$GITHUB_WORKSPACE/deploy/yallaplays"

          if [ ! -d "$BUNDLE" ]; then
            echo "ERROR: deploy/yallaplays/ not found at $BUNDLE"
            ls -la "$GITHUB_WORKSPACE/deploy/" 2>/dev/null || echo "(deploy/ dir missing)"
            exit 1
          fi

          echo "Bundle contents:"
          ls -la "$BUNDLE/"

          for f in index.html about.html contact.html privacy.html terms.html cookies.html sitemap.xml robots.txt; do
            if [ ! -f "$BUNDLE/$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
            echo "  OK  $f ($(wc -c < "$BUNDLE/$f") bytes)"
          done

          echo "Pre-flight PASSED"

      - name: Clone Yallaplays repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== CLONING YALLAPLAYS REPO ==="
          if [ -z "$GH_PAT" ]; then
            echo "ERROR: GH_PAT secret not set"
            exit 1
          fi

          git clone "https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git" "$CLONE_DIR" || {
            echo "ERROR: Clone failed for $YALLAPLAYS_REPO"
            exit 1
          }

          echo "Clone OK. Branches:"
          git -C "$CLONE_DIR" branch -a | head -20

      - name: Setup git identity
        run: |
          git config --global user.name "MIFTEH AI OS"
          git config --global user.email "mifteh-ai@users.noreply.github.com"

      - name: Create or checkout feature branch
        run: |
          echo "=== BRANCH SETUP: $DEPLOY_BRANCH ==="
          cd "$CLONE_DIR"

          if git branch -r | grep -q "origin/$DEPLOY_BRANCH"; then
            echo "Branch exists remotely -- checking out"
            git checkout "$DEPLOY_BRANCH" || { echo "ERROR: checkout failed"; exit 1; }
          else
            echo "Creating new branch"
            git checkout -b "$DEPLOY_BRANCH" || { echo "ERROR: branch create failed"; exit 1; }
          fi

          echo "Current branch: $(git branch --show-current)"
          echo "HEAD: $(git rev-parse --short HEAD)"

      - name: Sync production files
        run: |
          echo "=== SYNCING PRODUCTION FILES ==="
          echo "Source : $GITHUB_WORKSPACE/deploy/yallaplays/"
          echo "Dest   : $CLONE_DIR/"

          if [ ! -d "$GITHUB_WORKSPACE/deploy/yallaplays" ]; then
            echo "ERROR: Source directory missing at sync time"
            exit 1
          fi

          rsync -av --checksum \
            "$GITHUB_WORKSPACE/deploy/yallaplays/" \
            "$CLONE_DIR/" || { echo "ERROR: rsync failed"; exit 1; }

          echo "Git status after sync:"
          git -C "$CLONE_DIR" status --short

      - name: Commit changes
        run: |
          echo "=== COMMITTING CHANGES ==="
          cd "$CLONE_DIR"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit -- files already up to date"
          else
            echo "Staged changes:"
            git diff --cached --stat
            git commit -m "feat(adsense): production AdSense activation by MIFTEH AI OS" || {
              echo "ERROR: git commit failed"
              exit 1
            }
            echo "Commit: $(git rev-parse --short HEAD)"
          fi

      - name: Push branch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== PUSHING BRANCH: $DEPLOY_BRANCH ==="
          cd "$CLONE_DIR"

          PUSH_URL="https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git"
          git push "$PUSH_URL" "$DEPLOY_BRANCH" --set-upstream --force-with-lease 2>&1 || \
            git push "$PUSH_URL" "$DEPLOY_BRANCH" --set-upstream 2>&1 || {
              echo "ERROR: push failed for $DEPLOY_BRANCH"
              exit 1
            }

          echo "Verifying branch on remote..."
          git ls-remote "$PUSH_URL" "refs/heads/$DEPLOY_BRANCH" | grep -q "$DEPLOY_BRANCH" || {
            echo "ERROR: branch not found remotely after push"
            exit 1
          }
          echo "Push confirmed on remote"

      - name: Create Pull Request
        id: create_pr
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== CREATING PULL REQUEST ==="
          echo "$GH_PAT" | gh auth login --with-token 2>/dev/null

          EXISTING=$(gh pr list \
            --repo "$YALLAPLAYS_REPO" \
            --head "$DEPLOY_BRANCH" \
            --json number,url \
            --jq '.[0].url' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR already exists: $EXISTING"
            PR_URL="$EXISTING"
            PR_NUMBER=$(gh pr list --repo "$YALLAPLAYS_REPO" --head "$DEPLOY_BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          else
            printf 'Production AdSense deployment.\n\nPublisher: ca-pub-1206965892808259\nAdSense injected, compliance pages added, SEO score 80/100.\n' \
              > /tmp/pr_body.txt

            PR_URL=$(gh pr create \
              --repo "$YALLAPLAYS_REPO" \
              --head "$DEPLOY_BRANCH" \
              --base main \
              --title "feat(adsense): Production AdSense Activation + Compliance Pages" \
              --body-file /tmp/pr_body.txt 2>&1) || {
              echo "ERROR: gh pr create failed"
              exit 1
            }
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi

          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "PR URL    : $PR_URL"
          echo "PR Number : $PR_NUMBER"

      - name: Auto-merge PR
        if: ${{ github.event.inputs.auto_merge == 'true' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== AUTO-MERGING PR #$PR_NUMBER ==="
          echo "$GH_PAT" | gh auth login --with-token 2>/dev/null

          if [ -z "$PR_NUMBER" ]; then
            echo "ERROR: PR_NUMBER not set"
            exit 1
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "$YALLAPLAYS_REPO" \
            --merge \
            --delete-branch 2>&1 || {
            echo "ERROR: merge failed -- may require review approval"
            echo "Manual merge: $PR_URL"
            exit 1
          }
          echo "PR merged"

      - name: Wait for GitHub Pages
        if: ${{ github.event.inputs.auto_merge == 'true' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== WAITING FOR GITHUB PAGES BUILD ==="
          echo "$GH_PAT" | gh auth login --with-token 2>/dev/null

          ELAPSED=0
          MAX=300
          STEP=20

          while [ $ELAPSED -lt $MAX ]; do
            STATUS=$(gh api "repos/${YALLAPLAYS_REPO}/pages" --jq '.status' 2>/dev/null || echo "unknown")
            echo "  [${ELAPSED}s] Pages: $STATUS"
            if [ "$STATUS" = "built" ]; then
              PAGES_URL=$(gh api "repos/${YALLAPLAYS_REPO}/pages" --jq '.html_url' 2>/dev/null || echo "")
              echo "  Pages built: $PAGES_URL"
              break
            fi
            sleep $STEP
            ELAPSED=$((ELAPSED + STEP))
          done

          if [ "$STATUS" != "built" ]; then
            echo "WARNING: Pages still '$STATUS' after ${MAX}s"
          fi

      - name: Validate live site
        run: |
          echo "=== LIVE SITE VALIDATION: $LIVE_URL ==="
          sleep 5

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -H "User-Agent: MIFTEH-AI-OS/1.0" "$LIVE_URL" 2>/dev/null || echo "0")
          echo "HTTP status: $HTTP"

          BODY=$(curl -s --max-time 15 -H "User-Agent: MIFTEH-AI-OS/1.0" "$LIVE_URL" 2>/dev/null || echo "")

          check() {
            local label="$1" pattern="$2"
            echo "$BODY" | grep -q "$pattern" && echo "  PASS  $label" || echo "  MISS  $label"
          }

          check "AdSense script"      "pagead2.googlesyndication.com"
          check "Publisher ID"        "ca-pub-1206965892808259"
          check "AI Powered banner"   "AI POWERED"
          check "AdSense Ready badge" "AdSense Ready"
          check "MIFTEH AI footer"    "MIFTEH AI OS"
          check "RTL layout"          'dir="rtl"'

          echo ""
          for page in about contact privacy terms cookies; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "User-Agent: MIFTEH-AI-OS/1.0" "${LIVE_URL}/${page}.html" 2>/dev/null || echo "0")
            [ "$CODE" = "200" ] && echo "  LIVE  /${page}.html" || echo "  PEND  /${page}.html (HTTP $CODE)"
          done

      - name: Save deployment report
        if: always()
        env:
          INPUT_AUTO_MERGE: ${{ github.event.inputs.auto_merge }}
        run: python3 scripts/save_deployment_report.py

      - name: Final summary
        if: always()
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          echo "Branch  : $DEPLOY_BRANCH"
          echo "PR      : $PR_URL"
          echo "Live    : $LIVE_URL"
          echo "Run     : https://github.com/Zakoosh/MIFTEH-AI-OS/actions/runs/$GITHUB_RUN_ID"
          if [ "${{ github.event.inputs.auto_merge }}" != "true" ]; then
            echo ""
            echo "NEXT: Merge the PR to deploy to production"
            echo "      $PR_URL"
          fi
