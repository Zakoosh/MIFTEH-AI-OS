name: AI Weekly Reporter

on:
  schedule:
    - cron: '0 7 * * 0'   # 07:00 UTC Sunday = 10:00 Istanbul
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run weekly reporter
        env:
          TELEGRAM_LOG_TOKEN: ${{ secrets.TELEGRAM_LOG_TOKEN }}
          TELEGRAM_ADMIN_LOG_TOKEN: ${{ secrets.TELEGRAM_ADMIN_LOG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: python scripts/weekly_reporter.py

      - name: Commit weekly report
        run: |
          git config user.name "MIFTEH OS"
          git config user.email "actions@mifteh.ai"
          git add memory/weekly_reports/ || true
          git diff --cached --quiet || git -c commit.gpgsign=false commit -m "chore: weekly report $(date -u +%Y-%m-%d)"
          git push
