name: AI Game Testing

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC daily (after generator)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  qa-games:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run QA checks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_LOG_TOKEN: ${{ secrets.TELEGRAM_LOG_TOKEN }}
          TELEGRAM_ADMIN_LOG_TOKEN: ${{ secrets.TELEGRAM_ADMIN_LOG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: python scripts/game_qa.py

      - name: Commit QA report
        run: |
          git config user.name "MIFTEH OS"
          git config user.email "actions@mifteh.ai"
          git add memory/game_qa_report.json memory/reviews/ || true
          git diff --cached --quiet || git -c commit.gpgsign=false commit -m "chore: game-qa run $(date -u +%Y-%m-%d)"
          git push
