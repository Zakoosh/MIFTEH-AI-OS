name: MIFTEH AI Engagement Analysis

# Engagement-focused analytics: session depth, scroll patterns, CTA interactions,
# return visitor analysis, and engagement scoring per project.
# Runs daily at 04:00 UTC — after analytics intelligence at 03:00.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engagement-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run engagement analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FOCUS: engagement
        run: python scripts/generate_analytics_intelligence.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit engagement report
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/ outputs/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Engagement analysis [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
