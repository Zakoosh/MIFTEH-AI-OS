name: MIFTEH AI Web Intelligence

# Crawls competitor websites, monitors HN/Reddit/GitHub for trends,
# detects SEO changes, pricing shifts, UI redesigns, new features.
# Runs Mon 01:00 UTC — earliest Phase G feed.

on:
  schedule:
    - cron: '0 1 * * 1'    # Monday 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run web intelligence engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/web_intelligence_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit web intelligence data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/web_intelligence.json memory/web_intelligence/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Web intelligence cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
