name: MIFTEH AI Traffic Optimizer

# SEO and traffic optimization: reads analytics decision queue, identifies
# high-opportunity SEO pages, and autonomously generates new content to capture traffic.
# Runs weekly Monday 10:00 UTC — after feature-builder at 09:00.

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]

permissions:
  contents: write

jobs:
  traffic-optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Refresh traffic-focused analytics
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FOCUS: traffic
        run: python scripts/generate_analytics_intelligence.py

      - name: Generate SEO cluster pages based on decision queue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          FEATURE_TYPES: category_page,seo_hub,page
        run: python scripts/generate_product.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit optimization outputs
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/ outputs/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Traffic optimization cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
