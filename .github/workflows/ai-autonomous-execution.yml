name: MIFTEH AI Autonomous Executor

# Reads the product decision queue, prioritizes by impact,
# generates full feature missions (plan → HTML → validate → PR → memory update).
# Runs Wednesday 09:00 UTC — after roadmap (Tue) and analytics (Mon/daily).

on:
  schedule:
    - cron: '0 9 * * 3'    # Wednesday 09:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]
      max_missions:
        description: 'Max missions to execute per run'
        required: false
        default: '3'
        type: string
      dry_run:
        description: 'Dry run — plan only, no PRs created'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  autonomous-execution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Execute autonomous missions
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          MAX_MISSIONS: ${{ inputs.max_missions || '3' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/autonomous_executor.py

      - name: Run visual QA on generated previews
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
        run: python scripts/generate_previews.py

      - name: Sync memory
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SYNTHESIZE_LEARNINGS: 'false'
        run: python scripts/memory_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit execution results
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/ outputs/ frontend/dashboard/
          git diff --cached --quiet || git commit -m "AI: Autonomous execution cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
