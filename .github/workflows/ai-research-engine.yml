name: MIFTEH AI Research Engine

# Deep competitor research, ranking opportunity analysis,
# UX pattern comparison, monetization benchmarking,
# emerging technology detection.
# Runs Mon/Thu 13:00 UTC — 2x per week.

on:
  schedule:
    - cron: '0 13 * * 1,4'    # Mon/Thu 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run research engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/research_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit research state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/research_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Research engine cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
