name: MIFTEH AI QA Engine

# AI-powered quality review for all generated HTML features.
# Evaluates visual hierarchy, CTA quality, UX clarity, conversion optimization,
# content readability, SEO quality, trust signals, and accessibility.
# Runs Tuesday 10:00 UTC — after feature generation and visual preview.

on:
  schedule:
    - cron: '0 10 * * 2'   # Tuesday 10:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]
      force_review:
        description: 'Force re-review of already reviewed features'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  ai-qa-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run AI QA review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          FORCE_REVIEW: ${{ inputs.force_review || 'false' }}
        run: python scripts/ai_qa_engine.py

      - name: Aggregate dashboard with AI QA data
        run: python scripts/aggregate_dashboard.py

      - name: Commit AI QA results
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/ai_qa/ memory/ai_qa_summary.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: AI QA review cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
