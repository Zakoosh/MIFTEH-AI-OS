name: MIFTEH AI Realtime Event Engine

# Monitors breaking events — Google algorithm updates, viral tech launches,
# market-moving news. Injects emergency queue items on high-impact detections.
# Runs daily 06:00 UTC — highest frequency Phase G workflow.

on:
  schedule:
    - cron: '0 6 * * *'    # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  realtime-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run realtime event engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/realtime_event_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit realtime alert data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/realtime_alerts.json memory/analytics_intelligence.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Realtime events cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
