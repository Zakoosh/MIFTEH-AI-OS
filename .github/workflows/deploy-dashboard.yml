name: Deploy MIFTEH OS Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment structure
        run: |
          echo "=== Deployment root: frontend/dashboard ==="
          find frontend/dashboard -type f | sort
          echo "=== Checking required files ==="
          test -f frontend/dashboard/index.html && echo "✓ index.html" || echo "✗ index.html MISSING"
          test -f frontend/dashboard/css/style.css && echo "✓ css/style.css" || echo "✗ css/style.css MISSING"
          test -f frontend/dashboard/js/app.js   && echo "✓ js/app.js"    || echo "✗ js/app.js MISSING"
          test -f frontend/dashboard/CNAME        && echo "✓ CNAME"        || echo "✗ CNAME MISSING"
          test -f frontend/dashboard/.nojekyll    && echo "✓ .nojekyll"   || echo "✗ .nojekyll MISSING"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
