name: MIFTEH AI Traffic Intelligence

# Estimates competitor traffic, detects CTR shifts, identifies seasonal spikes,
# models traffic opportunity by keyword cluster and content gap.
# Runs Wed 02:00 UTC.

on:
  schedule:
    - cron: '0 2 * * 3'    # Wednesday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run traffic intelligence engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/traffic_intelligence.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit traffic intelligence data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/traffic_intelligence.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Traffic intelligence cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
