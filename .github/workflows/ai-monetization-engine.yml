name: MIFTEH AI Monetization Engine

# Gap detection, ad/CTA optimization, revenue lift estimation,
# pricing intelligence across all three projects.
# Runs Wed 06:00 UTC — after traffic intelligence.

on:
  schedule:
    - cron: '0 6 * * 3'    # Wednesday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monetization-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run monetization engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/monetization_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit monetization data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/monetization_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Monetization engine cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
