name: MIFTEH AI Dashboard Loop

on:
  schedule:
    - cron: '30 * * * *'   # every hour at :30 (offset from AI loops)
  workflow_run:
    workflows:
      - "MIFTEH AI SEO Loop"
      - "MIFTEH AI Finance Loop"
      - "MIFTEH AI Content Loop"
      - "MIFTEH AI Analytics Loop"
      - "MIFTEH AI PR Generator"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aggregate dashboard data
        run: python scripts/aggregate_dashboard.py

      - name: Commit dashboard.json
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add frontend/dashboard/data/dashboard.json memory/
          git diff --cached --quiet || git commit -m "AI: Dashboard update [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push

      - name: Trigger Pages deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-dashboard.yml --ref main
