name: MIFTEH AI Tool Runtime

# Tool registration, permission system, execution sandboxing, rate limiting.
# Tests all registered tools and logs execution stats.
# Runs daily 12:00 UTC.

on:
  schedule:
    - cron: '0 12 * * *'    # Daily 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tool-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run tool runtime
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/tool_runtime.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit tool runtime state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/tool_registry.json memory/tool_execution_log.json memory/tool_runtime_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Tool runtime cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
