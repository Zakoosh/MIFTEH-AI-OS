name: MIFTEH AI Analytics Intelligence

# Full analytics intelligence cycle: generates AI-estimated behavioral analytics,
# cross-project analysis, recommendations, and autonomous decision queue.
# Runs daily at 03:00 UTC — before other optimization workflows.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      focus:
        description: 'Analysis focus area'
        required: false
        default: 'analytics'
        type: choice
        options: [analytics, engagement, traffic, conversion]

permissions:
  contents: write

jobs:
  analytics-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run analytics intelligence cycle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FOCUS: ${{ inputs.focus || 'analytics' }}
        run: python scripts/generate_analytics_intelligence.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit intelligence report and dashboard
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/analytics_intelligence.json outputs/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Analytics intelligence cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
