name: MIFTEH AI Market Intelligence

# Monitors competitors, detects trending keywords, viral topics,
# new monetization angles. Runs Monday 03:00 UTC — feeds all other engines.

on:
  schedule:
    - cron: '0 3 * * 1'    # Monday 03:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]

permissions:
  contents: write

jobs:
  market-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run market intelligence
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
        run: python scripts/market_intelligence.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit market intelligence data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/market_intelligence.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Market intelligence cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
