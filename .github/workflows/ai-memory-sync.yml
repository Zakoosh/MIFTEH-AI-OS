name: MIFTEH AI Memory Sync

# Synthesizes learnings from all memory records (successes, failures, prompts)
# using AI to extract patterns. Updates strategy files and saves learnings.
# Runs daily at 05:00 UTC — before analytics and executor cycles.

on:
  schedule:
    - cron: '0 5 * * *'    # daily 05:00 UTC
  workflow_dispatch:
    inputs:
      synthesize_learnings:
        description: 'Run AI learning synthesis (uses OpenAI tokens)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  memory-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run memory sync + learning synthesis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SYNTHESIZE_LEARNINGS: ${{ inputs.synthesize_learnings || 'true' }}
        run: python scripts/memory_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit memory state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Memory sync + learnings [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
