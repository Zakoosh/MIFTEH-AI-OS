name: MIFTEH AI Repository Analysis

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC — analyzes repos and creates draft PRs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Analyze repos and create draft PRs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO_YALLAPLAYS: Zakoosh/Yallaplays
          GITHUB_REPO_FIONERA: Zakoosh/fionera
          GITHUB_REPO_MIFTEH: Zakoosh/mifteh-main-site
        run: python scripts/analyze_repo_and_create_pr.py

      - name: Commit analysis outputs and PR records
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add outputs/ memory/
          git diff --cached --quiet || git commit -m "AI: Repository analysis + PR generation [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
