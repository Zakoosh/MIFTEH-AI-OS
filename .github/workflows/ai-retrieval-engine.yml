name: MIFTEH AI Retrieval Engine

# Semantic memory search across vector index.
# Runs pre-computed retrieval results for common agent queries.
# Runs daily 11:00 UTC — after vector memory indexing.

on:
  schedule:
    - cron: '0 11 * * *'    # Daily 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrieval-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run retrieval engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/retrieval_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit retrieval state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/retrieval_results.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Retrieval engine cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
