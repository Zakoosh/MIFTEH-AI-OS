name: MIFTEH AI Social Signal Engine

# Detects viral topics, rising discussions, finance sentiment,
# gaming trends, emerging categories from Reddit, HN, GitHub.
# Runs Tue 04:00 UTC — after competitor memory.

on:
  schedule:
    - cron: '0 4 * * 2'    # Tuesday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  social-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run social signal engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/social_signal_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit social signal data
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/social_signals.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Social signal cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
