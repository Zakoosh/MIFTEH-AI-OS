name: MIFTEH AI Governance Engine

# Risk scoring, deployment permissions, execution budgets, rollback governance,
# trust escalation, sandbox mode. Controls AI autonomy safely.
# Runs daily 01:00 UTC — before runtime and economy cycles.

on:
  schedule:
    - cron: '0 1 * * *'    # Daily 01:00 UTC
  workflow_dispatch:
    inputs:
      company_mode:
        description: 'Company mode'
        required: false
        default: 'semi_autonomous'
        type: choice
        options: [assisted, semi_autonomous, autonomous, civilization]

permissions:
  contents: write

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run governance engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COMPANY_MODE: ${{ inputs.company_mode || 'semi_autonomous' }}
        run: python scripts/governance_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit governance state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/governance_state.json memory/governance_report.json memory/company_mode.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Governance cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
