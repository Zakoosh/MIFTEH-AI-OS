name: AI Google Indexing

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily (after games are deployed)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  google-indexing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai google-auth requests oauth2client httplib2 cryptography

      - name: Run Google Indexing Engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_LOG_TOKEN: ${{ secrets.TELEGRAM_LOG_TOKEN }}
          TELEGRAM_ADMIN_LOG_TOKEN: ${{ secrets.TELEGRAM_ADMIN_LOG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          YALLAPLAYS_BASE_URL: ${{ secrets.YALLAPLAYS_BASE_URL || 'https://yallaplays.com' }}
        run: python scripts/google_indexing_engine.py

      - name: Commit indexing state
        run: |
          git config user.name "MIFTEH OS"
          git config user.email "actions@mifteh.ai"
          git add memory/indexing/ memory/indexing_report.json || true
          git diff --cached --quiet || git -c commit.gpgsign=false commit -m "chore: indexing run $(date -u +%Y-%m-%d)"
          git push
