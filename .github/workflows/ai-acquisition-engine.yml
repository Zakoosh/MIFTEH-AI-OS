name: MIFTEH AI Acquisition Engine

# Viral content generation, SEO cluster expansion, social campaign generation,
# launch sequencing, outreach opportunities, growth loop activation.
# Runs Tue/Fri 08:00 UTC — 2x per week cadence.

on:
  schedule:
    - cron: '0 8 * * 2,5'    # Tue/Fri 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  acquisition-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run acquisition engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/acquisition_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit acquisition state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/acquisition_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Acquisition engine cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
