name: MIFTEH AI Safe Apply

# Validates and applies pre-approved safe changes.
# NEVER runs automatically — only via manual workflow_dispatch.
# Always creates a draft PR for human review — never force-merges.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (yallaplays|fionera|mifteh)'
        required: true
        type: choice
        options:
          - yallaplays
          - fionera
          - mifteh
      operation:
        description: 'Operation to run'
        required: true
        type: choice
        options:
          - seo-analysis
          - content-generation
          - metadata-update
      dry_run:
        description: 'Dry run (generate changes but do not commit)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  validate-and-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Validate target repo
        env:
          TARGET_REPO: ${{ inputs.repo }}
        run: |
          echo "[safe-apply] Target: $TARGET_REPO | Operation: ${{ inputs.operation }} | Dry run: ${{ inputs.dry_run }}"
          case "$TARGET_REPO" in
            yallaplays|fionera|mifteh) echo "[safe-apply] Target repo valid: $TARGET_REPO" ;;
            *) echo "[safe-apply] ERROR: Unknown target repo: $TARGET_REPO"; exit 1 ;;
          esac

      - name: Run safe apply (production)
        if: ${{ inputs.dry_run == 'false' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_REPO: ${{ inputs.repo }}
          OPERATION: ${{ inputs.operation }}
          DRY_RUN: 'false'
          GITHUB_REPO_YALLAPLAYS: Zakoosh/Yallaplays
          GITHUB_REPO_FIONERA: Zakoosh/fionera
          GITHUB_REPO_MIFTEH: Zakoosh/mifteh-main-site
        run: python scripts/analyze_repo_and_create_pr.py

      - name: Run safe apply (dry run)
        if: ${{ inputs.dry_run != 'false' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_REPO: ${{ inputs.repo }}
          OPERATION: ${{ inputs.operation }}
          DRY_RUN: 'true'
          GITHUB_REPO_YALLAPLAYS: Zakoosh/Yallaplays
          GITHUB_REPO_FIONERA: Zakoosh/fionera
          GITHUB_REPO_MIFTEH: Zakoosh/mifteh-main-site
        run: |
          echo "[safe-apply] Dry run mode — analysis only, no commits"
          python scripts/safe_apply_dry_run.py

      - name: Commit outputs (if not dry run)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add outputs/ memory/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "AI: Safe apply — ${{ inputs.repo }} ${{ inputs.operation }} [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
