name: MIFTEH AI Product Builder

# Builds Fionera product features: BIST market pages, crypto movers,
# AI stock analysis, portfolio tracker, AI alerts.
# Fetches real BIST data via TwelveData if API key configured.

on:
  schedule:
    - cron: '0 4 * * *'    # Daily 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  product-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run product builder
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python scripts/product_builder.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit product build
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/product_builder_report.json outputs/fionera/product/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Fionera product build [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
