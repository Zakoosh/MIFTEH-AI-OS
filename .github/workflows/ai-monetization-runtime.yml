name: MIFTEH AI Monetization Runtime

# Executes monetization strategies: AdSense optimization, sponsorship slots,
# affiliate blocks, premium conversion funnels, B2B lead funnels, pricing optimization.
# Runs daily 06:00 UTC — after growth engine.

on:
  schedule:
    - cron: '0 6 * * *'    # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monetization-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run monetization runtime
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/monetization_runtime.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit monetization state
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/monetization_runtime_report.json frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Monetization runtime cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
