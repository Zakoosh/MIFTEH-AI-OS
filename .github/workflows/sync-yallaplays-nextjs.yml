name: Sync YallaPlays Next.js Source

# Syncs targets/yallaplays/yallaplays/ (Next.js 15 source) to Zakoosh/Yallaplays repo.
# Creates feature branch, commits, and opens PR.
# Uses GH_PAT for cross-repo write access.

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Target branch in Yallaplays repo'
        required: false
        default: 'feat/adsense-production-activation'
      auto_merge:
        description: 'Auto-merge PR after creation'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  YALLAPLAYS_REPO: Zakoosh/Yallaplays
  DEPLOY_BRANCH: ${{ github.event.inputs.branch_name || 'feat/adsense-production-activation' }}
  LIVE_URL: https://yallaplays.com
  CLONE_DIR: /tmp/yallaplays-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout MIFTEH-AI-OS
        uses: actions/checkout@v4

      - name: Validate Next.js source
        run: |
          echo "=== VALIDATING NEXT.JS SOURCE ==="
          SRC="$GITHUB_WORKSPACE/targets/yallaplays/yallaplays"

          if [ ! -f "$SRC/package.json" ]; then
            echo "ERROR: package.json not found at $SRC"
            exit 1
          fi

          for f in \
            src/app/layout.tsx \
            src/app/page.tsx \
            src/app/about/page.tsx \
            src/app/contact/page.tsx \
            src/app/privacy/page.tsx \
            src/app/terms/page.tsx \
            src/app/cookies/page.tsx \
            src/components/adsense/AdSense.tsx \
            src/components/footer/Footer.tsx \
            src/components/MonetizationSlot.tsx \
            src/app/sitemap.ts \
            public/robots.txt; do
            if [ ! -f "$SRC/$f" ]; then
              echo "ERROR: Missing $f"
              exit 1
            fi
            echo "  OK  $f"
          done
          echo "Source validation PASSED"

      - name: Build Next.js to verify
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: targets/yallaplays/yallaplays/package-lock.json

      - run: npm ci
        working-directory: targets/yallaplays/yallaplays

      - name: Run build
        working-directory: targets/yallaplays/yallaplays
        run: |
          npm run build 2>&1 | tee /tmp/build.log
          if grep -q "Error" /tmp/build.log; then
            echo "ERROR: Build failed"
            cat /tmp/build.log
            exit 1
          fi
          echo "Build PASSED"

      - name: Clone Yallaplays repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== CLONING YALLAPLAYS ==="
          if [ -z "$GH_PAT" ]; then
            echo "ERROR: GH_PAT secret not set"
            exit 1
          fi
          git clone "https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git" "$CLONE_DIR"
          echo "Clone OK. HEAD: $(git -C "$CLONE_DIR" rev-parse --short HEAD)"

      - name: Setup git identity
        run: |
          git config --global user.name "MIFTEH AI OS"
          git config --global user.email "mifteh-ai@users.noreply.github.com"

      - name: Create or checkout feature branch
        run: |
          cd "$CLONE_DIR"
          if git branch -r | grep -q "origin/$DEPLOY_BRANCH"; then
            git checkout "$DEPLOY_BRANCH"
            echo "Checked out existing branch: $DEPLOY_BRANCH"
          else
            git checkout -b "$DEPLOY_BRANCH"
            echo "Created new branch: $DEPLOY_BRANCH"
          fi

      - name: Sync Next.js source files
        run: |
          echo "=== SYNCING NEXT.JS SOURCE ==="
          SRC="$GITHUB_WORKSPACE/targets/yallaplays/yallaplays"
          DEST="$CLONE_DIR/yallaplays"

          rsync -av --checksum \
            --include="src/***" \
            --include="public/***" \
            --include="package.json" \
            --include="package-lock.json" \
            --include="next.config.ts" \
            --include="tailwind.config.ts" \
            --include="postcss.config.js" \
            --include="tsconfig.json" \
            --exclude="node_modules/" \
            --exclude=".next/" \
            --exclude="out/" \
            --exclude="scripts/" \
            "$SRC/" "$DEST/"

          echo "Git status after sync:"
          git -C "$CLONE_DIR" status --short | head -30

      - name: Commit changes
        run: |
          cd "$CLONE_DIR"
          git add yallaplays/
          if git diff --cached --quiet; then
            echo "No changes to commit — source already up to date"
          else
            git diff --cached --stat
            git commit -m "feat(nextjs): AdSense + legal pages + footer + MIFTEH AI OS marker

- AdSense component: next/script, ca-pub-1206965892808259, hydration-safe
- Footer component: legal links + AI Powered by MIFTEH AI OS badge
- Legal pages: /about /contact /privacy /terms /cookies (App Router)
- layout.tsx: AdSenseScript injected, Footer component wired
- page.tsx: MIFTEH AI OS hero badge, inline footer removed
- MonetizationSlot: delegates to real AdSenseUnit
- sitemap.ts: all 5 legal routes + /games route added
- robots.txt: points to https://yallaplays.com/sitemap.xml
- Build verified: 64 static pages, 0 errors

Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            echo "Committed: $(git rev-parse --short HEAD)"
          fi

      - name: Push branch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd "$CLONE_DIR"
          PUSH_URL="https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git"
          git push "$PUSH_URL" "$DEPLOY_BRANCH" --set-upstream
          echo "Pushed to $DEPLOY_BRANCH"
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Create Pull Request
        id: create_pr
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token

          EXISTING=$(gh pr list \
            --repo "$YALLAPLAYS_REPO" \
            --head "$DEPLOY_BRANCH" \
            --json url --jq '.[0].url' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR already exists: $EXISTING"
            PR_URL="$EXISTING"
          else
            PR_URL=$(gh pr create \
              --repo "$YALLAPLAYS_REPO" \
              --head "$DEPLOY_BRANCH" \
              --base main \
              --title "feat(nextjs): Production AdSense + Legal Pages + MIFTEH AI OS" \
              --body "## Production Next.js Integration

**Publisher:** \`ca-pub-1206965892808259\`

### Changes
- \`components/adsense/AdSense.tsx\` — next/script AdSense, hydration-safe
- \`components/footer/Footer.tsx\` — unified footer with legal links + MIFTEH AI OS badge
- \`app/about/page.tsx\` — About page (App Router)
- \`app/contact/page.tsx\` — Contact page
- \`app/privacy/page.tsx\` — Privacy policy (AdSense compliant)
- \`app/terms/page.tsx\` — Terms of service
- \`app/cookies/page.tsx\` — Cookie policy
- \`app/layout.tsx\` — AdSenseScript + Footer integrated
- \`app/page.tsx\` — MIFTEH AI OS hero badge
- \`app/sitemap.ts\` — all 5 legal routes
- \`public/robots.txt\` — correct sitemap URL

### Verification
- ✅ Build: 64 static pages, 0 TypeScript errors
- ✅ Routes: /about /contact /privacy /terms /cookies /sitemap.xml
- ✅ AdSense: pagead2.googlesyndication.com via next/script

🤖 Automated by [MIFTEH AI OS](https://github.com/Zakoosh/MIFTEH-AI-OS)")

            echo "PR created: $PR_URL"
          fi
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"

      - name: Auto-merge PR
        if: ${{ github.event.inputs.auto_merge == 'true' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          PR_NUMBER=$(gh pr list --repo "$YALLAPLAYS_REPO" --head "$DEPLOY_BRANCH" --json number --jq '.[0].number')
          gh pr merge "$PR_NUMBER" --repo "$YALLAPLAYS_REPO" --merge --delete-branch
          echo "PR #$PR_NUMBER merged"

      - name: Wait for GitHub Pages build
        if: ${{ github.event.inputs.auto_merge == 'true' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          for i in $(seq 1 15); do
            STATUS=$(gh api repos/${YALLAPLAYS_REPO}/pages --jq '.status' 2>/dev/null || echo "unknown")
            echo "  [${i}] Pages status: $STATUS"
            [ "$STATUS" = "built" ] && break
            sleep 20
          done

      - name: Validate live site
        run: |
          echo "=== LIVE VALIDATION: $LIVE_URL ==="
          sleep 10
          BODY=$(curl -s --max-time 20 -H "User-Agent: MIFTEH-AI-OS/1.0" "$LIVE_URL" 2>/dev/null || echo "")
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$LIVE_URL")
          echo "HTTP: $HTTP"

          check() { echo "$BODY" | grep -qi "$2" && echo "  PASS  $1" || echo "  MISS  $1"; }
          check "AdSense script"      "pagead2.googlesyndication.com"
          check "Publisher ID"        "ca-pub-1206965892808259"
          check "MIFTEH AI OS"        "MIFTEH AI OS"
          check "RTL layout"          'dir="rtl"'

          echo ""
          for page in about contact privacy terms cookies; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${LIVE_URL}/${page}/" 2>/dev/null || echo "0")
            [ "$CODE" = "200" ] && echo "  LIVE  /${page}/" || echo "  PEND  /${page}/ (HTTP $CODE)"
          done

          SITEMAP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${LIVE_URL}/sitemap.xml")
          [ "$SITEMAP" = "200" ] && echo "  LIVE  /sitemap.xml" || echo "  PEND  /sitemap.xml (HTTP $SITEMAP)"

      - name: Summary
        if: always()
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          echo "Branch : $DEPLOY_BRANCH"
          echo "Commit : $COMMIT_SHA"
          echo "PR     : $PR_URL"
          echo "Live   : $LIVE_URL"
          echo "Run    : https://github.com/Zakoosh/MIFTEH-AI-OS/actions/runs/$GITHUB_RUN_ID"
