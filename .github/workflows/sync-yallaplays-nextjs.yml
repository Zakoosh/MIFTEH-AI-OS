name: Sync YallaPlays Next.js Source

# Applies Next.js AdSense + legal pages changes to Zakoosh/Yallaplays.
# Uses targets/yallaplays-nextjs.patch (pre-generated diff) and GH_PAT.
# Creates feature branch, commits, and opens PR.

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Target branch in Yallaplays repo'
        required: false
        default: 'feat/adsense-production-activation'
      auto_merge:
        description: 'Auto-merge PR after creation'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  YALLAPLAYS_REPO: Zakoosh/Yallaplays
  DEPLOY_BRANCH: ${{ github.event.inputs.branch_name || 'feat/adsense-production-activation' }}
  LIVE_URL: https://yallaplays.com
  CLONE_DIR: /tmp/yallaplays-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout MIFTEH-AI-OS
        uses: actions/checkout@v4

      - name: Validate patch file
        run: |
          PATCH="$GITHUB_WORKSPACE/targets/yallaplays-nextjs.patch"
          [ -f "$PATCH" ] || { echo "ERROR: patch not found"; exit 1; }
          ACTUAL=$(grep -c "^diff --git" "$PATCH" || echo 0)
          [ "$ACTUAL" -ge 12 ] || { echo "ERROR: only $ACTUAL diffs (expected 12+)"; exit 1; }
          echo "Patch OK — $ACTUAL files, $(wc -l < "$PATCH") lines"
          grep "^diff --git" "$PATCH"

      - name: Clone Yallaplays repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          [ -n "$GH_PAT" ] || { echo "ERROR: GH_PAT not set"; exit 1; }
          git clone "https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git" "$CLONE_DIR"
          echo "Clone OK — HEAD: $(git -C "$CLONE_DIR" rev-parse --short HEAD)"

      - name: Setup git identity
        run: |
          git config --global user.name "MIFTEH AI OS"
          git config --global user.email "mifteh-ai@users.noreply.github.com"

      - name: Create or checkout feature branch
        run: |
          cd "$CLONE_DIR"
          if git branch -r | grep -q "origin/$DEPLOY_BRANCH"; then
            git checkout "$DEPLOY_BRANCH"
          else
            git checkout -b "$DEPLOY_BRANCH"
          fi
          echo "Branch: $(git branch --show-current) @ $(git rev-parse --short HEAD)"

      - name: Apply patch
        run: |
          PATCH="$GITHUB_WORKSPACE/targets/yallaplays-nextjs.patch"
          cd "$CLONE_DIR"
          if git apply --check "$PATCH" 2>/dev/null; then
            git apply "$PATCH"
            echo "Patch applied cleanly"
          else
            git apply --3way "$PATCH" || git apply --reject "$PATCH" 2>/dev/null || true
            echo "Patch applied with 3-way merge"
          fi
          git status --short

      - name: Verify critical files present
        run: |
          cd "$CLONE_DIR"
          MISSING=0
          for f in \
            yallaplays/src/app/about/page.tsx \
            yallaplays/src/app/contact/page.tsx \
            yallaplays/src/app/cookies/page.tsx \
            yallaplays/src/app/privacy/page.tsx \
            yallaplays/src/app/terms/page.tsx \
            yallaplays/src/components/adsense/AdSense.tsx \
            yallaplays/src/components/footer/Footer.tsx \
            yallaplays/src/app/layout.tsx \
            yallaplays/src/app/sitemap.ts \
            yallaplays/public/robots.txt; do
            if [ -f "$f" ]; then echo "  OK  $f"
            else echo "  MISSING  $f"; MISSING=$((MISSING+1)); fi
          done
          [ "$MISSING" -eq 0 ] || { echo "ERROR: $MISSING files missing after patch"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: /tmp/yallaplays-sync/yallaplays
        run: npm ci

      - name: Build to verify
        working-directory: /tmp/yallaplays-sync/yallaplays
        run: |
          npm run build 2>&1 | tee /tmp/build.log
          grep -q "Generating static pages" /tmp/build.log || { echo "ERROR: Build failed"; tail -30 /tmp/build.log; exit 1; }
          PAGES=$(grep "Generating static pages" /tmp/build.log | tail -1 | grep -o "[0-9]*/[0-9]*" | tail -1 || echo "?")
          echo "Build PASSED — pages: $PAGES"

      - name: Commit changes
        run: |
          cd "$CLONE_DIR"
          git add yallaplays/src/ yallaplays/public/robots.txt
          if git diff --cached --quiet; then
            echo "No changes — already up to date"
          else
            git diff --cached --stat
            {
              echo "feat(nextjs): AdSense + legal pages + footer + MIFTEH AI OS marker"
              echo ""
              echo "- AdSense: next/script, ca-pub-1206965892808259, hydration-safe"
              echo "- Footer: legal links + AI Powered by MIFTEH AI OS badge"
              echo "- Pages: /about /contact /privacy /terms /cookies (App Router)"
              echo "- layout.tsx: AdSenseScript + Footer integrated"
              echo "- page.tsx: MIFTEH AI OS badge, inline footer removed"
              echo "- sitemap.ts: all legal routes + /games"
              echo "- robots.txt: https://yallaplays.com/sitemap.xml"
              echo "- Build: 64 static pages, 0 errors"
              echo ""
              echo "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            } > /tmp/commit_msg.txt
            git commit -F /tmp/commit_msg.txt
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            echo "Committed: $(git rev-parse --short HEAD)"
          fi

      - name: Push branch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd "$CLONE_DIR"
          git push "https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git" "$DEPLOY_BRANCH" --set-upstream
          echo "Pushed: $DEPLOY_BRANCH"

      - name: Create Pull Request
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          EXISTING=$(gh pr list --repo "$YALLAPLAYS_REPO" --head "$DEPLOY_BRANCH" --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR exists: $EXISTING"
            echo "PR_URL=$EXISTING" >> "$GITHUB_ENV"
          else
            {
              echo "## Production Next.js Integration"
              echo ""
              echo "Publisher: ca-pub-1206965892808259"
              echo ""
              echo "Changed files:"
              echo "  components/adsense/AdSense.tsx - next/script AdSense, hydration-safe"
              echo "  components/footer/Footer.tsx - footer with legal links + MIFTEH AI OS badge"
              echo "  app/about/page.tsx - About page (App Router)"
              echo "  app/contact/page.tsx - Contact page"
              echo "  app/privacy/page.tsx - Privacy policy"
              echo "  app/terms/page.tsx - Terms of service"
              echo "  app/cookies/page.tsx - Cookie policy"
              echo "  app/layout.tsx - AdSenseScript + Footer integrated"
              echo "  app/page.tsx - MIFTEH AI OS badge"
              echo "  app/sitemap.ts - all 5 legal routes"
              echo "  public/robots.txt - correct sitemap URL"
              echo ""
              echo "Build: 64 static pages, 0 errors"
              echo "Deployed by MIFTEH AI OS"
            } > /tmp/pr_body.txt
            PR_URL=$(gh pr create \
              --repo "$YALLAPLAYS_REPO" \
              --head "$DEPLOY_BRANCH" \
              --base main \
              --title "feat(nextjs): Production AdSense + Legal Pages + MIFTEH AI OS" \
              --body-file /tmp/pr_body.txt)
            echo "PR created: $PR_URL"
            echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"
          fi

      - name: Auto-merge PR
        if: github.event.inputs.auto_merge == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          PR_NUMBER=$(gh pr list --repo "$YALLAPLAYS_REPO" --head "$DEPLOY_BRANCH" --json number --jq '.[0].number')
          gh pr merge "$PR_NUMBER" --repo "$YALLAPLAYS_REPO" --merge --delete-branch
          echo "PR #$PR_NUMBER merged"

      - name: Wait for GitHub Pages
        if: github.event.inputs.auto_merge == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          for i in $(seq 1 20); do
            STATUS=$(gh api "repos/${YALLAPLAYS_REPO}/pages" --jq '.status' 2>/dev/null || echo "unknown")
            echo "  [${i}] Pages: $STATUS"
            [ "$STATUS" = "built" ] && break
            sleep 20
          done

      - name: Validate live site
        if: github.event.inputs.auto_merge == 'true'
        run: |
          sleep 15
          BODY=$(curl -s --max-time 30 -H "User-Agent: MIFTEH-AI-OS/1.0" "$LIVE_URL" || true)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$LIVE_URL")
          echo "HTTP: $HTTP"
          echo "$BODY" | grep -qi "pagead2.googlesyndication.com" && echo "  PASS AdSense" || echo "  MISS AdSense"
          echo "$BODY" | grep -qi "ca-pub-1206965892808259"      && echo "  PASS Publisher" || echo "  MISS Publisher"
          echo "$BODY" | grep -qi "MIFTEH AI OS"                 && echo "  PASS MIFTEH badge" || echo "  MISS MIFTEH badge"
          for page in about contact privacy terms cookies; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${LIVE_URL}/${page}/")
            [ "$CODE" = "200" ] && echo "  LIVE /${page}/" || echo "  PEND /${page}/ ($CODE)"
          done
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${LIVE_URL}/sitemap.xml")
          [ "$CODE" = "200" ] && echo "  LIVE /sitemap.xml" || echo "  PEND /sitemap.xml ($CODE)"

      - name: Summary
        if: always()
        run: |
          echo "Branch : $DEPLOY_BRANCH"
          echo "Commit : ${COMMIT_SHA:-already-up-to-date}"
          echo "PR     : ${PR_URL:-none}"
          echo "Live   : $LIVE_URL"
          echo "Run    : https://github.com/Zakoosh/MIFTEH-AI-OS/actions/runs/$GITHUB_RUN_ID"
