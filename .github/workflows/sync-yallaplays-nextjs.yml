name: Sync YallaPlays Next.js Source

# Applies Next.js UI upgrade patch to Zakoosh/Yallaplays.
# Uses targets/yallaplays-nextjs.patch (pre-generated unified diff) and GH_PAT.
# Creates feature branch, commits, opens PR, and auto-merges.

on:
  push:
    branches: [main]
    paths:
      - 'targets/yallaplays-nextjs.patch'
      - '.github/workflows/sync-yallaplays-nextjs.yml'
      - 'targets/sync-trigger'
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'Auto-merge PR after creation'
        required: false
        default: 'true'

permissions:
  contents: write

env:
  YALLAPLAYS_REPO: Zakoosh/Yallaplays
  DEPLOY_BRANCH: feat/ui-upgrade-v${{ github.run_number }}
  LIVE_URL: https://yallaplays.com
  CLONE_DIR: /tmp/yallaplays-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout MIFTEH-AI-OS
        uses: actions/checkout@v4

      - name: Validate patch file
        run: |
          PATCH="$GITHUB_WORKSPACE/targets/yallaplays-nextjs.patch"
          [ -f "$PATCH" ] || { echo "ERROR: patch not found"; exit 1; }
          ACTUAL=$(grep -c "^diff --git" "$PATCH" || echo 0)
          [ "$ACTUAL" -ge 7 ] || { echo "ERROR: only $ACTUAL diffs (expected 7+)"; exit 1; }
          echo "Patch OK — $ACTUAL files, $(wc -l < "$PATCH") lines"
          grep "^diff --git" "$PATCH"

      - name: Clone Yallaplays repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          [ -n "$GH_PAT" ] || { echo "ERROR: GH_PAT not set"; exit 1; }
          git clone "https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git" "$CLONE_DIR"
          echo "Clone OK — HEAD: $(git -C "$CLONE_DIR" rev-parse --short HEAD)"

      - name: Setup git identity
        run: |
          git config --global user.name "MIFTEH AI OS"
          git config --global user.email "mifteh-ai@users.noreply.github.com"

      - name: Create fresh feature branch
        run: |
          cd "$CLONE_DIR"
          git checkout -b "$DEPLOY_BRANCH"
          echo "Branch: $DEPLOY_BRANCH @ $(git rev-parse --short HEAD)"

      - name: Apply patch
        run: |
          PATCH="$GITHUB_WORKSPACE/targets/yallaplays-nextjs.patch"
          cd "$CLONE_DIR"
          if git apply --check "$PATCH" 2>/dev/null; then
            git apply "$PATCH"
            echo "Patch applied cleanly"
          else
            git apply --3way "$PATCH" || git apply --reject "$PATCH" 2>/dev/null || true
            echo "Patch applied with 3-way merge"
          fi
          git status --short

      - name: Verify critical files present
        run: |
          cd "$CLONE_DIR"
          MISSING=0
          for f in \
            yallaplays/src/app/about/page.tsx \
            yallaplays/src/app/contact/page.tsx \
            yallaplays/src/app/page.tsx \
            yallaplays/src/app/globals.css \
            yallaplays/src/app/layout.tsx \
            yallaplays/src/components/adsense/AdSense.tsx \
            yallaplays/src/components/footer/Footer.tsx \
            yallaplays/src/components/MobileAnchorAd.tsx \
            yallaplays/src/components/ImportedGameCard.tsx; do
            if [ -f "$f" ]; then echo "  OK  $f"
            else echo "  MISSING  $f"; MISSING=$((MISSING+1)); fi
          done
          [ "$MISSING" -eq 0 ] || { echo "ERROR: $MISSING files missing after patch"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: /tmp/yallaplays-sync/yallaplays
        run: npm ci

      - name: Build to verify
        working-directory: /tmp/yallaplays-sync/yallaplays
        run: |
          npm run build 2>&1 | tee /tmp/build.log
          grep -q "Generating static pages" /tmp/build.log || { echo "ERROR: Build failed"; tail -40 /tmp/build.log; exit 1; }
          PAGES=$(grep "Generating static pages" /tmp/build.log | tail -1 | grep -o "[0-9]*/[0-9]*" | tail -1 || echo "?")
          echo "Build PASSED — pages: $PAGES"

      - name: Commit changes
        run: |
          cd "$CLONE_DIR"
          git add yallaplays/src/
          if git diff --cached --quiet; then
            echo "No changes — already up to date"
          else
            git diff --cached --stat
            {
              echo "feat(ui): production UI upgrade — trending, AI picks, ratings, share"
              echo ""
              echo "Homepage new sections:"
              echo "  - Trending Now horizontal scroll (12 games with rank badges)"
              echo "  - AI Recommended 4-card grid with MIFTEH AI OS badge"
              echo "  - New This Week horizontal scroll"
              echo "  - Most Played ranked list (top 5)"
              echo ""
              echo "Component upgrades:"
              echo "  - ImportedGameCard: star ratings, play count, hover play overlay, badges"
              echo "  - Footer: gradient top border, sitemap link, 4-column layout"
              echo "  - GameDetail: share buttons (copy/WhatsApp/Twitter), improved sidebar"
              echo "  - MonetizationSlot: CLS-safe min-heights per format"
              echo "  - Hero mosaic: real game thumbnails from GameDistribution"
              echo ""
              echo "New component:"
              echo "  - MobileAnchorAd: sticky bottom ad on mobile (dismissible)"
              echo ""
              echo "Performance:"
              echo "  - width/height on all img elements (CLS prevention)"
              echo "  - Reserved min-heights on all ad slots"
              echo "  - Lazy loading on non-hero images"
              echo ""
              echo "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            } > /tmp/commit_msg.txt
            git commit -F /tmp/commit_msg.txt
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            echo "Committed: $(git rev-parse --short HEAD)"
          fi

      - name: Push branch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd "$CLONE_DIR"
          git push "https://x-access-token:${GH_PAT}@github.com/${YALLAPLAYS_REPO}.git" "$DEPLOY_BRANCH" --set-upstream
          echo "Pushed: $DEPLOY_BRANCH"

      - name: Create Pull Request
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          {
            echo "## Production UI Upgrade — MIFTEH AI OS"
            echo ""
            echo "### Homepage New Sections"
            echo "- **Trending Now** horizontal scroll — 12 games with rank badges"
            echo "- **AI Recommended** 4-card grid — curated by MIFTEH AI OS"
            echo "- **New This Week** horizontal scroll"
            echo "- **Most Played** ranked list (top 5)"
            echo ""
            echo "### Game Cards Upgraded"
            echo "- Star ratings (deterministic 3.5–5.0★)"
            echo "- Play count display (2K–100K)"
            echo "- Hover play button overlay"
            echo "- AI/Trending/New/Hot badge system"
            echo ""
            echo "### New Components"
            echo "- **MobileAnchorAd** — sticky bottom ad on mobile, dismissible"
            echo "- **ShareButtons** — copy link, WhatsApp, Twitter on game pages"
            echo ""
            echo "### UI Polish"
            echo "- Footer: gradient top border + sitemap link"
            echo "- Hero mosaic: real game thumbnails"
            echo "- GameDetail: improved sidebar with thumbnails in related games"
            echo "- MIFTEH AI OS badge in game sidebar"
            echo ""
            echo "### AdSense / Performance"
            echo "- All ad slots have CLS-safe min-heights"
            echo "- img elements have width/height attributes"
            echo "- Non-hero images lazy-loaded"
            echo ""
            echo "Build: verified ✓ | Deployed by MIFTEH AI OS | Run #${{ github.run_number }}"
          } > /tmp/pr_body.txt
          PR_URL=$(gh pr create \
            --repo "$YALLAPLAYS_REPO" \
            --head "$DEPLOY_BRANCH" \
            --base main \
            --title "feat(ui): Trending, AI Picks, Ratings, Share — production UI v2" \
            --body-file /tmp/pr_body.txt)
          echo "PR created: $PR_URL"
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"

      - name: Auto-merge PR
        if: github.event.inputs.auto_merge == 'true' || github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          PR_NUMBER=$(gh pr list --repo "$YALLAPLAYS_REPO" --head "$DEPLOY_BRANCH" --json number --jq '.[0].number')
          gh pr merge "$PR_NUMBER" --repo "$YALLAPLAYS_REPO" --merge --delete-branch
          echo "PR #$PR_NUMBER merged"

      - name: Wait for GitHub Pages
        if: github.event.inputs.auto_merge == 'true' || github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "$GH_PAT" | gh auth login --with-token
          for i in $(seq 1 24); do
            STATUS=$(gh api "repos/${YALLAPLAYS_REPO}/pages" --jq '.status' 2>/dev/null || echo "unknown")
            echo "  [${i}] Pages: $STATUS"
            [ "$STATUS" = "built" ] && break
            sleep 20
          done

      - name: Validate live site
        if: github.event.inputs.auto_merge == 'true' || github.event_name == 'push'
        run: |
          sleep 20
          BODY=$(curl -s --max-time 30 -H "User-Agent: MIFTEH-AI-OS/1.0" "$LIVE_URL" || true)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$LIVE_URL")
          echo "HTTP: $HTTP"
          echo "$BODY" | grep -qi "pagead2.googlesyndication.com" && echo "  PASS AdSense script" || echo "  MISS AdSense script"
          echo "$BODY" | grep -qi "ca-pub-1206965892808259"      && echo "  PASS Publisher ID" || echo "  MISS Publisher ID"
          echo "$BODY" | grep -qi "MIFTEH AI OS"                 && echo "  PASS MIFTEH badge" || echo "  MISS MIFTEH badge"
          echo "$BODY" | grep -qi "الأكثر لعبًا"                && echo "  PASS Trending section" || echo "  MISS Trending section"
          echo "$BODY" | grep -qi "مقترحات الذكاء"              && echo "  PASS AI Picks section" || echo "  MISS AI Picks section"
          echo "$BODY" | grep -qi "جديد هذا الأسبوع"            && echo "  PASS New This Week section" || echo "  MISS New This Week section"
          for page in about contact privacy terms cookies; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${LIVE_URL}/${page}/")
            [ "$CODE" = "200" ] && echo "  LIVE /${page}/" || echo "  PEND /${page}/ ($CODE)"
          done

      - name: Summary
        if: always()
        run: |
          echo "Branch : $DEPLOY_BRANCH"
          echo "Commit : ${COMMIT_SHA:-already-up-to-date}"
          echo "PR     : ${PR_URL:-none}"
          echo "Live   : $LIVE_URL"
          echo "Run    : https://github.com/Zakoosh/MIFTEH-AI-OS/actions/runs/$GITHUB_RUN_ID"
