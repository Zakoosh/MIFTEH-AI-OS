name: MIFTEH AI Experiment Engine

# Generates A/B test variants for headlines, CTAs, layouts, SEO structures.
# Evaluates winners by QA score delta. Saves winning variants for review.
# Runs Thursday 09:00 UTC.

on:
  schedule:
    - cron: '0 9 * * 4'    # Thursday 09:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]
      experiment_types:
        description: 'Comma-separated experiment types'
        required: false
        default: 'headline,cta,seo_structure'
        type: string

permissions:
  contents: write

jobs:
  experiment-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run experiment engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          EXPERIMENT_TYPES: ${{ inputs.experiment_types || 'headline,cta,seo_structure' }}
        run: python scripts/experiment_engine.py

      - name: Aggregate dashboard
        run: python scripts/aggregate_dashboard.py

      - name: Commit experiment results
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/experiments/ memory/experiment_summary.json frontend/dashboard/previews/ frontend/dashboard/data/
          git diff --cached --quiet || git commit -m "AI: Experiment engine cycle [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
