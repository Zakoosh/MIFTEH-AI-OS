name: MIFTEH AI Widget Generator

# Generates interactive widget components (finance widgets, game components).
# Runs weekly (Tuesday) focused on widget/component types only.

on:
  schedule:
    - cron: '0 9 * * 2'   # Tuesday 09:00 UTC
  workflow_dispatch:
    inputs:
      target_project:
        description: 'Target project (yallaplays|fionera|mifteh|all)'
        required: false
        default: 'all'
        type: choice
        options: [all, yallaplays, fionera, mifteh]

permissions:
  contents: write

jobs:
  generate-widgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate widgets and components
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_PROJECT: ${{ inputs.target_project || 'all' }}
          FEATURE_TYPES: widget,component
        run: python scripts/generate_product.py

      - name: Commit outputs and PR records
        run: |
          git config user.name "MIFTEH AI OS"
          git config user.email "mifteh-ai@users.noreply.github.com"
          git pull --rebase origin main
          git add outputs/ memory/
          git diff --cached --quiet || git commit -m "AI: Widget generation [$(date -u +%Y-%m-%dT%H:%M:%SZ)] [skip ci]"
          git push
