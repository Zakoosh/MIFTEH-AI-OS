name: AI Game Generator

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-games:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate games
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_LOG_TOKEN: ${{ secrets.TELEGRAM_LOG_TOKEN }}
          TELEGRAM_ADMIN_LOG_TOKEN: ${{ secrets.TELEGRAM_ADMIN_LOG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: python scripts/game_factory.py

      - name: Commit outputs
        run: |
          git config user.name "MIFTEH OS"
          git config user.email "actions@mifteh.ai"
          git add memory/game_factory_report.json memory/game_factory/ memory/reviews/ outputs/yallaplays/games/ || true
          git diff --cached --quiet || git -c commit.gpgsign=false commit -m "chore: game-factory run $(date -u +%Y-%m-%d)"
          git push
