<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MIFTEH AI OS</title>

    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

    <div class="layout">

        <aside class="sidebar">
            <h1>MIFTEH AI</h1>

            <div class="menu">
                <button>Dashboard</button>
                <button>Projects</button>
                <button>Missions</button>
                <button>Agents</button>
                <button>Reports</button>
                <button>Errors</button>
            </div>
        </aside>

        <main class="main">

            <div class="topbar">
                <h2>AI Operations Center</h2>

                <div class="status online">
                    SYSTEM ONLINE
                </div>
            </div>

            <div class="cards">

                <div class="card">
                    <h3>Projects</h3>
                    <p id="projects-count">0</p>
                </div>

                <div class="card">
                    <h3>Reports</h3>
                    <p id="reports-count">0</p>
                </div>

                <div class="card">
                    <h3>Agents</h3>
                    <p id="agents-count">0</p>
                </div>

                <div class="card">
                    <h3>Missions</h3>
                    <p id="missions-count">0</p>
                </div>

            </div>

            <div class="panel">
                <h3>Recent Activity</h3>

                <div id="activity-feed"></div>
            </div>

        </main>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
