<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MIFTEH AI OS</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h1>MIFTEH<br/>AI</h1>

            <div class="menu">
                <button onclick="showTab('dashboard')">Dashboard</button>
                <button onclick="showTab('projects')">Projects</button>
                <button onclick="showTab('missions')">Missions</button>
                <button onclick="showTab('agents')">Agents</button>
                <button onclick="showTab('reports')">Reports</button>
                <button onclick="showTab('errors')">Errors</button>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <h2>AI Operations Center</h2>
                <div class="status online">SYSTEM ONLINE</div>
            </div>

            <section id="dashboard" class="tab active">
                <div class="cards">
                    <div class="card"><h3>Projects</h3><p id="projects-count">0</p></div>
                    <div class="card"><h3>Reports</h3><p id="reports-count">0</p></div>
                    <div class="card"><h3>Agents</h3><p id="agents-count">0</p></div>
                    <div class="card"><h3>Missions</h3><p id="missions-count">0</p></div>
                </div>

                <div class="panel">
                    <h3>Recent Activity</h3>
                    <div id="activity-feed"></div>
                </div>
            </section>

            <section id="projects" class="tab">
                <div class="panel">
                    <h3>Projects</h3>
                    <div id="projects-list"></div>
                </div>
            </section>

            <section id="missions" class="tab">
                <div class="panel">
                    <h3>Missions Control</h3>
                    <div id="missions-list"></div>
                </div>
            </section>

            <section id="agents" class="tab">
                <div class="panel">
                    <h3>Active Agents</h3>
                    <div id="agents-list"></div>
                </div>
            </section>

            <section id="reports" class="tab">
                <div class="panel">
                    <h3>Reports</h3>
                    <div id="reports-list"></div>
                </div>
            </section>

            <section id="errors" class="tab">
                <div class="panel">
                    <h3>Errors / Offline Status</h3>
                    <div id="errors-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
